<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Валидатор целостности · Legend of Worlds</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1628;
            color: #c0d0e0;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #00e5ff;
            font-size: 1.5rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subtitle {
            color: #5a7a9a;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .run-btn {
            background: linear-gradient(135deg, #00e5ff, #00a8cc);
            color: #0a1628;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .run-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 229, 255, 0.3);
        }
        .results {
            display: grid;
            gap: 16px;
        }
        .result-section {
            background: #0d1b2a;
            border: 1px solid #1a3a5c;
            border-radius: 10px;
            overflow: hidden;
        }
        .result-header {
            padding: 14px 18px;
            background: #0d1f35;
            border-bottom: 1px solid #1a3a5c;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .result-title {
            font-size: 1rem;
            font-weight: 600;
            color: #e0e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-count {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        .count-ok { background: #55ff8833; color: #55ff88; }
        .count-warn { background: #ffaa4433; color: #ffaa44; }
        .count-error { background: #ff444433; color: #ff4444; }
        .result-content {
            padding: 12px 18px;
            max-height: 300px;
            overflow-y: auto;
        }
        .check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #111e30;
            font-size: 0.9rem;
        }
        .check-item:last-child { border-bottom: none; }
        .check-icon { font-size: 1rem; width: 20px; text-align: center; }
        .check-ok { color: #55ff88; }
        .check-warn { color: #ffaa44; }
        .check-error { color: #ff4444; }
        .check-name { color: #c0d0e0; }
        .check-detail { color: #5a7a9a; font-size: 0.8rem; margin-left: auto; }
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            background: #0d1b2a;
            border-top: 1px solid #1a3a5c;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
        }
        .status-ok { color: #55ff88; }
        .status-warn { color: #ffaa44; }
        .status-error { color: #ff4444; }
        @media (max-width: 700px) {
            body { padding: 12px; }
            h1 { font-size: 1.2rem; }
            .result-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .status-bar { flex-direction: column; gap: 4px; font-size: 0.8rem; padding: 10px; }
        }
    </style>
</head>
<body>
    <h1><i class="fas fa-stethoscope"></i> Валидатор целостности</h1>
    <p class="subtitle">Проверка связей между данными и файлами сайта</p>
    
    <button class="run-btn" onclick="runValidation()">
        <i class="fas fa-play"></i> Запустить проверку
    </button>

    <div class="results" id="results"></div>

    <div class="status-bar" id="statusBar" style="display: none;">
        <span id="statusText">Проверка...</span>
        <span id="statusTime"></span>
    </div>

    <script>
    function runValidation() {
        document.getElementById('results').innerHTML = '';
        document.getElementById('statusBar').style.display = 'flex';
        document.getElementById('statusText').textContent = 'Проверка...';
        
        var startTime = Date.now();
        var results = [];
        
        // Проверка 1: Герои и их файлы
        checkHeroes(results);
        
        // Проверка 2: Предметы и иконки
        checkItems(results);
        
        // Проверка 3: Ссылки
        checkLinks(results);
        
        // Отображение результатов
        displayResults(results);
        
        var elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
        document.getElementById('statusTime').textContent = elapsed + ' сек';
    }
    
    function checkHeroes(results) {
        var heroes = typeof HEROES_DATA !== 'undefined' ? HEROES_DATA : [];
        var items = [];
        
        heroes.forEach(function(hero) {
            var hasCard = true; // Проверка существования файла
            var hasImage = hero.image ? true : false;
            var hasBuild = typeof heroBuilds !== 'undefined' && heroBuilds[hero.heroId];
            
            items.push({
                name: hero.name,
                status: hasCard && hasImage ? 'ok' : 'warn',
                detail: (hasImage ? '✓ иконка' : '✗ иконка') + ', ' + (hasBuild ? '✓ сборка' : '✗ сборка')
            });
        });
        
        results.push({
            title: 'Герои',
            icon: 'fa-users',
            count: { ok: items.filter(i => i.status === 'ok').length, total: items.length },
            items: items
        });
    }
    
    function checkItems(results) {
        var db = typeof itemsDB !== 'undefined' ? itemsDB : {};
        var items = [];
        
        Object.keys(db).forEach(function(id) {
            var item = db[id];
            var hasIcon = item.icon && item.icon.length > 0;
            
            items.push({
                name: item.name || id,
                status: hasIcon ? 'ok' : 'warn',
                detail: hasIcon ? '✓ иконка' : '⚠ нет иконки'
            });
        });
        
        results.push({
            title: 'Предметы',
            icon: 'fa-flask',
            count: { ok: items.filter(i => i.status === 'ok').length, total: items.length },
            items: items.slice(0, 20) // Показываем первые 20
        });
    }
    
    function checkLinks(results) {
        // Проверка внутренних ссылок
        var links = [
            { name: 'Главная', url: 'index.html' },
            { name: 'Герои', url: 'heroes.html' },
            { name: 'Предметы', url: 'items.html' },
            { name: 'Механики', url: 'mechanics.html' },
            { name: 'Монстры', url: 'monsters.html' },
            { name: 'Калькулятор', url: 'calculator.html' },
            { name: 'Сравнение', url: 'compare.html' },
            { name: 'Гайды', url: 'guides.html' },
            { name: 'FAQ', url: 'faq.html' },
            { name: 'Лор', url: 'lore.html' },
            { name: 'Поддержка', url: 'support.html' },
            { name: 'Обновления', url: 'updates.html' },
            { name: 'Режимы', url: 'modes.html' }
        ];
        
        // В статическом HTML не можем проверить существование файлов
        // Просто показываем список ссылок
        results.push({
            title: 'Ссылки',
            icon: 'fa-link',
            count: { ok: links.length, total: links.length },
            items: links.slice(0, 10).map(function(l) {
                return { name: l.name, status: 'ok', detail: l.url };
            })
        });
    }
    
    function displayResults(results) {
        var container = document.getElementById('results');
        var html = '';
        
        results.forEach(function(section) {
            var countClass = section.count.ok === section.count.total ? 'count-ok' : 
                            section.count.ok > section.count.total * 0.7 ? 'count-warn' : 'count-error';
            
            html += '<div class="result-section">';
            html += '<div class="result-header">';
            html += '<div class="result-title"><i class="fas ' + section.icon + '"></i> ' + section.title + '</div>';
            html += '<span class="result-count ' + countClass + '">' + section.count.ok + '/' + section.count.total + '</span>';
            html += '</div>';
            html += '<div class="result-content">';
            
            section.items.forEach(function(item) {
                var icon = item.status === 'ok' ? 'fa-check-circle check-ok' : 
                          item.status === 'warn' ? 'fa-exclamation-circle check-warn' : 'fa-times-circle check-error';
                html += '<div class="check-item">';
                html += '<i class="fas ' + icon + ' check-icon"></i>';
                html += '<span class="check-name">' + item.name + '</span>';
                if (item.detail) {
                    html += '<span class="check-detail">' + item.detail + '</span>';
                }
                html += '</div>';
            });
            
            html += '</div></div>';
        });
        
        container.innerHTML = html;
        document.getElementById('statusText').textContent = 'Проверка завершена';
    }
    </script>
</body>
</html>
