<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="images/logo.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена · Legend of Worlds</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .not-found-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
            padding: 40px 20px;
        }
        .not-found-code {
            font-size: 6rem;
            font-weight: 700;
            color: #00e6ff;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 0 0 30px #00e6ff44;
        }
        .not-found-title {
            font-size: 1.4rem;
            color: #e0f0ff;
            margin-bottom: 12px;
        }
        .not-found-text {
            color: #6b7c99;
            font-size: 0.95rem;
            margin-bottom: 32px;
            max-width: 400px;
        }
        .not-found-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .not-found-links a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0f172a;
            border: 1px solid #2a4060;
            border-radius: 8px;
            padding: 10px 18px;
            color: #8ab4f0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: border-color 0.2s, color 0.2s;
        }
        .not-found-links a:hover {
            border-color: #00e6ff;
            color: #00e6ff;
        }
        .not-found-links a.primary {
            background: linear-gradient(135deg, #0a1a2a, #0f2535);
            border-color: #00e6ff44;
            color: #00e6ff;
        }
        @media (max-width: 500px) {
            .not-found-code {
                font-size: 4rem;
            }
            .not-found-title {
                font-size: 1.1rem;
            }
            .not-found-links {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="Legend of Worlds" class="logo-img" />
            <span class="logo-text">Legend of Worlds <small>Warcraft III</small></span>
        </a>
    </header>

    <div class="not-found-container">
        <div class="not-found-code">404</div>
        <div class="not-found-title">Страница не найдена</div>
        <p class="not-found-text">Возможно, она была перемещена или удалена. Попробуй начать с главной или воспользуйся поиском.</p>
        <div class="not-found-links">
            <a href="index.html" class="primary"><i class="fas fa-home"></i> Главная</a>
            <a href="heroes.html"><i class="fas fa-users"></i> Герои</a>
            <a href="items.html"><i class="fas fa-flask"></i> Предметы</a>
            <a href="mechanics.html"><i class="fas fa-cogs"></i> Механики</a>
        </div>
    </div>
</body>
</html>
