<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест превью предметов</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0e14;
      color: #d0dff0;
      font-family: 'Segoe UI', sans-serif;
      padding: 20px;
      min-height: 100vh;
    }
    h1 { color: #ffcc66; text-shadow: 0 0 8px #ffb347; margin-bottom: 16px; font-size: 1.4rem; }

    /* Переключатель режимов */
    .mode-switcher {
      display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .mode-btn {
      padding: 8px 16px; border-radius: 20px; border: 1px solid #2a5070;
      background: #101a28; color: #8ab4f0; cursor: pointer; font-size: 0.85rem;
      transition: 0.15s;
    }
    .mode-btn.active { background: #00e6ff; color: #0b0e14; border-color: #fff; box-shadow: 0 0 15px #00e6ff; }
    .mode-btn:hover { border-color: #00e6ff; }

    .mode-desc {
      background: #101a28; border: 1px solid #2a5070; border-radius: 12px;
      padding: 12px 16px; margin-bottom: 20px; font-size: 0.85rem; color: #8ab4f0;
    }

    /* Сетка предметов */
    .test-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) { .test-grid { grid-template-columns: repeat(2, 1fr); } }

    .item-card {
      background: #101a28; border: 1px solid #2a5070; border-radius: 12px;
      padding: 12px; text-align: center; cursor: pointer; transition: 0.15s;
      position: relative;
    }
    .item-card:hover { border-color: #00e6ff; box-shadow: 0 0 15px #00e6ff44; }
    .item-card .item-icon img {
      width: 56px; height: 56px; object-fit: contain; image-rendering: auto;
      border-radius: 8px; border: 2px solid #2a5070;
    }
    .item-card .item-name {
      margin-top: 6px; font-size: 0.85rem; font-weight: 600; color: #ffcc66;
      text-shadow: 0 0 4px #ffb34744;
    }
    .item-card .item-cost {
      font-size: 0.75rem; color: #7a8fa8; margin-top: 2px;
    }

    /* ===== ВАРИАНТ А: Тултип при наведении/тапе ===== */
    .item-tooltip {
      display: none; position: absolute; z-index: 100;
      background: rgba(14, 20, 32, 0.97); border: 1px solid #00e6ff88;
      border-radius: 12px; padding: 14px; min-width: 220px; max-width: 280px;
      box-shadow: 0 0 20px #00e6ff44, 0 8px 32px #000000aa;
      backdrop-filter: blur(12px); pointer-events: none;
    }
    .item-tooltip.visible { display: block; }
    .item-tooltip .tt-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .item-tooltip .tt-icon img { width: 40px; height: 40px; object-fit: contain; image-rendering: auto; border-radius: 6px; }
    .item-tooltip .tt-name { font-weight: 600; color: #ffcc66; font-size: 0.95rem; }
    .item-tooltip .tt-type { font-size: 0.7rem; color: #8ab4f0; }
    .item-tooltip .tt-desc { color: #b0c4de; font-size: 0.82rem; line-height: 1.4; margin-bottom: 8px; }
    .item-tooltip .tt-cost { color: #ffcc44; font-size: 0.8rem; font-weight: 600; }
    .item-tooltip .tt-hint { color: #5a7a9a; font-size: 0.7rem; margin-top: 6px; border-top: 1px solid #1e2a40; padding-top: 6px; }

    /* ===== ВАРИАНТ Б: Панель деталей внизу (текущий подход, улучшенный) ===== */
    .detail-panel-b {
      background: rgba(18, 25, 40, 0.9); border: 1px solid #2a4060;
      border-radius: 16px; padding: 20px; margin-top: 20px;
      box-shadow: 0 0 20px #00e6ff22;
      transition: 0.3s;
    }
    .detail-panel-b .dp-header { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .detail-panel-b .dp-icon img { width: 56px; height: 56px; object-fit: contain; border-radius: 10px; }
    .detail-panel-b .dp-name { font-size: 1.2rem; font-weight: 600; color: #ffcc66; }
    .detail-panel-b .dp-desc { color: #b0c4de; font-size: 0.9rem; margin-bottom: 10px; }
    .detail-panel-b .dp-cost { color: #ffcc44; font-weight: 600; }
    .detail-panel-b .dp-components { margin-top: 10px; }
    .detail-panel-b .dp-comp-item {
      display: inline-flex; align-items: center; gap: 4px;
      background: #101a28; border: 1px solid #2a5070; border-radius: 8px;
      padding: 4px 10px; margin: 3px; font-size: 0.8rem; cursor: pointer;
    }
    .detail-panel-b .dp-comp-item:hover { border-color: #00e6ff; }

    /* ===== ВАРИАНТ В: Bottom sheet ===== */
    .bottom-sheet-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
    }
    .bottom-sheet-overlay.visible { display: block; }
    .bottom-sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
      background: rgba(18, 25, 40, 0.97); backdrop-filter: blur(16px);
      border-top: 1px solid #00e6ff88; border-radius: 20px 20px 0 0;
      padding: 16px 20px 24px; max-height: 70vh; overflow-y: auto;
      transform: translateY(100%); transition: transform 0.3s ease;
      box-shadow: 0 -8px 40px #000000cc;
    }
    .bottom-sheet.visible { transform: translateY(0); }
    .bottom-sheet .bs-handle {
      width: 40px; height: 4px; background: #3a5070; border-radius: 2px;
      margin: 0 auto 14px;
    }
    .bottom-sheet .bs-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .bottom-sheet .bs-icon img { width: 48px; height: 48px; object-fit: contain; border-radius: 10px; }
    .bottom-sheet .bs-name { font-size: 1.1rem; font-weight: 600; color: #ffcc66; }
    .bottom-sheet .bs-type { font-size: 0.7rem; color: #8ab4f0; }
    .bottom-sheet .bs-desc { color: #b0c4de; font-size: 0.85rem; line-height: 1.5; margin-bottom: 10px; }
    .bottom-sheet .bs-cost { color: #ffcc44; font-weight: 600; font-size: 0.9rem; margin-bottom: 10px; }
    .bottom-sheet .bs-components { display: flex; flex-wrap: wrap; gap: 6px; }
    .bottom-sheet .bs-comp-item {
      display: inline-flex; align-items: center; gap: 4px;
      background: #101a28; border: 1px solid #2a5070; border-radius: 8px;
      padding: 6px 12px; font-size: 0.8rem; cursor: pointer;
    }
    .bottom-sheet .bs-comp-item:hover { border-color: #00e6ff; }
    .bottom-sheet .bs-close {
      position: absolute; top: 12px; right: 16px; background: none; border: none;
      color: #5a7a9a; font-size: 1.2rem; cursor: pointer;
    }
    .bottom-sheet .bs-close:hover { color: #00e6ff; }

    /* Пустое состояние */
    .empty-state {
      text-align: center; color: #5a7a9a; padding: 40px; font-size: 0.9rem;
    }
    .empty-state i { font-size: 2rem; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>

<h1><i class="fas fa-flask"></i> Тест превью предметов</h1>

<div class="mode-switcher">
  <button class="mode-btn active" data-mode="A">А: Тултип</button>
  <button class="mode-btn" data-mode="B">Б: Панель внизу</button>
  <button class="mode-btn" data-mode="C">В: Bottom sheet</button>
</div>

<div class="mode-desc" id="modeDesc">
  <strong>Вариант А:</strong> Наведение (десктоп) или тап (мобильный) → тултип рядом с карточкой. Повторный тап → полная панель.
</div>

<div class="test-grid" id="testGrid"></div>

<!-- Вариант Б: панель деталей -->
<div class="detail-panel-b" id="panelB" style="display:none;">
  <div class="empty-state"><i class="fas fa-hand-pointer"></i>Нажмите на предмет</div>
</div>

<!-- Вариант В: bottom sheet -->
<div class="bottom-sheet-overlay" id="bsOverlay"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="bs-handle"></div>
  <button class="bs-close" id="bsClose"><i class="fas fa-times"></i></button>
  <div id="bsContent">
    <div class="empty-state"><i class="fas fa-hand-pointer"></i>Нажмите на предмет</div>
  </div>
</div>

<script>
// Тестовые предметы
const testItems = [
  { id: 'I004', name: 'Когти', icon: '🐾', type: 'Базовый', cost: 400, desc: '+9 атаки', components: [] },
  { id: 'I007', name: 'Меч', icon: '⚔️', type: 'Базовый', cost: 450, desc: '+12 атаки', components: [] },
  { id: 'I005', name: 'Молот', icon: '🔨', type: 'Базовый', cost: 500, desc: '+15 атаки', components: [] },
  { id: 'I006', name: 'Топор', icon: '🪓', type: 'Базовый', cost: 550, desc: '+17 атаки', components: [] },
  { id: 'I0CQ', name: 'Меч доблести', icon: '⚔️✨', type: 'Оружие', cost: 3300, desc: '+110 атаки', components: ['I004','I007','I005'] },
  { id: 'I033', name: 'Меч ярости', icon: '😡⚔️', type: 'Оружие', cost: 9200, desc: '+180 атаки, +15% скорости атаки', components: ['I0CQ','I006'] },
];

const ICONS_DIR = 'images/items/';

function itemImg(id, size) {
  size = size || 56;
  return `<img src="${ICONS_DIR}${id}.png" alt="" width="${size}" height="${size}" style="image-rendering:auto;object-fit:contain;" onerror="this.style.display='none'">`;
}

let currentMode = 'A';
let activeTooltip = null;
let tapCount = 0;
let tapTimer = null;

// Рендер сетки
const grid = document.getElementById('testGrid');
testItems.forEach(item => {
  const card = document.createElement('div');
  card.className = 'item-card';
  card.dataset.itemId = item.id;
  card.innerHTML = `
    <div class="item-icon">${itemImg(item.id)}</div>
    <div class="item-name">${item.name}</div>
    <div class="item-cost">${item.cost} 💰</div>
    <div class="item-tooltip" id="tt-${item.id}">
      <div class="tt-header">
        <div class="tt-icon">${itemImg(item.id, 40)}</div>
        <div><div class="tt-name">${item.name}</div><div class="tt-type">${item.type}</div></div>
      </div>
      <div class="tt-desc">${item.desc}</div>
      <div class="tt-cost">💰 ${item.cost}</div>
      <div class="tt-hint">Нажмите ещё раз для деталей</div>
    </div>
  `;
  grid.appendChild(card);
});

// Переключение режимов
const modeDescs = {
  A: '<strong>Вариант А:</strong> Наведение (десктоп) или тап (мобильный) → тултип рядом с карточкой. Повторный тап → полная панель.',
  B: '<strong>Вариант Б:</strong> Клик → панель деталей внизу страницы с автоскроллом (текущий подход, улучшенный).',
  C: '<strong>Вариант В:</strong> Клик → bottom sheet снизу экрана. Закрытие — свайп вниз или кнопка ✕.'
};

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    document.getElementById('modeDesc').innerHTML = modeDescs[currentMode];
    // Скрыть всё
    hideAllTooltips();
    document.getElementById('panelB').style.display = 'none';
    closeBottomSheet();
  });
});

// ===== ВАРИАНТ А: Тултип =====
function hideAllTooltips() {
  document.querySelectorAll('.item-tooltip').forEach(t => t.classList.remove('visible'));
  activeTooltip = null;
}

function showTooltip(card, itemId) {
  hideAllTooltips();
  const tt = document.getElementById('tt-' + itemId);
  if (!tt) return;

  // Позиционирование
  const rect = card.getBoundingClientRect();
  const ttWidth = 260;
  const spaceRight = window.innerWidth - rect.right;
  const spaceLeft = rect.left;

  if (spaceRight > ttWidth + 10) {
    tt.style.left = (rect.width + 8) + 'px';
    tt.style.right = 'auto';
    tt.style.top = '0px';
  } else if (spaceLeft > ttWidth + 10) {
    tt.style.right = (rect.width + 8) + 'px';
    tt.style.left = 'auto';
    tt.style.top = '0px';
  } else {
    // Мобильный: показываем под карточкой
    tt.style.left = '50%';
    tt.style.right = 'auto';
    tt.style.top = (rect.height + 8) + 'px';
    tt.style.transform = 'translateX(-50%)';
  }

  tt.classList.add('visible');
  activeTooltip = itemId;
}

// Десктоп: hover
document.querySelectorAll('.item-card').forEach(card => {
  card.addEventListener('mouseenter', () => {
    if (currentMode === 'A') showTooltip(card, card.dataset.itemId);
  });
  card.addEventListener('mouseleave', () => {
    if (currentMode === 'A') hideAllTooltips();
  });
});

// Мобильный: тап
document.querySelectorAll('.item-card').forEach(card => {
  card.addEventListener('click', (e) => {
    const itemId = card.dataset.itemId;
    const item = testItems.find(i => i.id === itemId);
    if (!item) return;

    if (currentMode === 'A') {
      // Первый тап — тултип, второй — полная панель
      if (activeTooltip === itemId) {
        // Второй тап — показать полную панель (вариант Б)
        hideAllTooltips();
        showPanelB(item);
      } else {
        showTooltip(card, itemId);
      }
    } else if (currentMode === 'B') {
      showPanelB(item);
    } else if (currentMode === 'C') {
      showBottomSheet(item);
    }
  });
});

// Закрыть тултип при клике вне
document.addEventListener('click', (e) => {
  if (!e.target.closest('.item-card')) hideAllTooltips();
});

// ===== ВАРИАНТ Б: Панель внизу =====
function showPanelB(item) {
  const panel = document.getElementById('panelB');
  const compNames = (item.components || []).map(cid => {
    const ci = testItems.find(i => i.id === cid);
    return ci ? `<span class="dp-comp-item">${itemImg(ci.id, 24)} ${ci.name}</span>` : '';
  }).join('');

  panel.innerHTML = `
    <div class="dp-header">
      <div class="dp-icon">${itemImg(item.id, 56)}</div>
      <div>
        <div class="dp-name">${item.name}</div>
        <div style="font-size:0.75rem;color:#8ab4f0;">${item.type}</div>
      </div>
    </div>
    <div class="dp-desc">${item.desc}</div>
    <div class="dp-cost">💰 ${item.cost}</div>
    ${item.components.length ? `<div class="dp-components"><strong style="font-size:0.85rem;">Компоненты:</strong> ${compNames}</div>` : ''}
  `;
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ===== ВАРИАНТ В: Bottom sheet =====
function showBottomSheet(item) {
  const compNames = (item.components || []).map(cid => {
    const ci = testItems.find(i => i.id === cid);
    return ci ? `<span class="bs-comp-item">${itemImg(ci.id, 24)} ${ci.name}</span>` : '';
  }).join('');

  document.getElementById('bsContent').innerHTML = `
    <div class="bs-header">
      <div class="bs-icon">${itemImg(item.id, 48)}</div>
      <div>
        <div class="bs-name">${item.name}</div>
        <div class="bs-type">${item.type}</div>
      </div>
    </div>
    <div class="bs-desc">${item.desc}</div>
    <div class="bs-cost">💰 ${item.cost}</div>
    ${item.components.length ? `<div class="bs-components"><strong style="font-size:0.85rem;color:#7a8fa8;">Компоненты:</strong> ${compNames}</div>` : ''}
  `;

  document.getElementById('bsOverlay').classList.add('visible');
  document.getElementById('bottomSheet').classList.add('visible');
}

function closeBottomSheet() {
  document.getElementById('bsOverlay').classList.remove('visible');
  document.getElementById('bottomSheet').classList.remove('visible');
}

document.getElementById('bsClose').addEventListener('click', closeBottomSheet);
document.getElementById('bsOverlay').addEventListener('click', closeBottomSheet);

// Свайп вниз для закрытия bottom sheet
let bsStartY = 0;
const bs = document.getElementById('bottomSheet');
bs.addEventListener('touchstart', (e) => { bsStartY = e.touches[0].clientY; });
bs.addEventListener('touchend', (e) => {
  const dy = e.changedTouches[0].clientY - bsStartY;
  if (dy > 60) closeBottomSheet();
});
</script>

</body>
</html>
